name: jellyfin_movie_app
description: "Jellyfin 电影专用 App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  go_router: ^17.2.3
  # 鸿蒙适配
  shared_preferences:
    path: ../../packages/ohos/shared_preferences/shared_preferences
  jellyfin_core:
    path: ../../packages/foundation/jellyfin_core
  jellyfin_api:
    path: ../../packages/foundation/jellyfin_api
  jellyfin_dart:
    path: ../../packages/vendor/jellyfin_dart_3.8
  jellyfin_models:
    path: ../../packages/shared/jellyfin_models
  jellyfin_ui_kit:
    path: ../../packages/shared/jellyfin_ui_kit
  jellyfin_movies:
    path: ../../packages/features/jellyfin_movies
  jellyfin_media:
    path: ../../packages/features/jellyfin_media
  jellyfin_series:
    path: ../../packages/features/jellyfin_series
  jellyfin_playback:
    path: ../../packages/features/jellyfin_playback
  jellyfin_auth:
    path: ../../packages/features/jellyfin_auth
  jellyfin_personal:
    path: ../../packages/features/jellyfin_personal
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

# 鸿蒙适配：强制子依赖也使用本地 ohos 路径
dependency_overrides:
  video_player:
    path: ../../packages/ohos/video_player/video_player
  path_provider:
    path: ../../packages/ohos/path_provider/path_provider
  shared_preferences:
    path: ../../packages/ohos/shared_preferences/shared_preferences

flutter:
  uses-material-design: true
