  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  go_router: ^17.2.3
  shared_preferences: ^2.2.2
  jellyfin_core:
    path: ../../packages/foundation/jellyfin_core
  jellyfin_api:
