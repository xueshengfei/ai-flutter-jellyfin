name: jellyfin_service_example
description: Jellyfin Service 测试应用
version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 引用父目录的 jellyfin_service（包含所有UI和播放依赖）
  jellyfin_service:
    path: ../

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

# 鸿蒙适配：强制子依赖也使用本地 ohos 路径
dependency_overrides:
  path_provider:
    path: ../packages/ohos/path_provider/path_provider

flutter:
  uses-material-design: true
