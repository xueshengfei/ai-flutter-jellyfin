name: jellyfin_ai_recommendation_example
description: AI 推荐业务模块独立测试应用
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 业务模块
  jellyfin_ai_recommendation:
    path: ../

  # 基础设施（图片 + 模型）
  jellyfin_models:
    path: ../../../shared/jellyfin_models
  jellyfin_ui_kit:
    path: ../../../shared/jellyfin_ui_kit

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
