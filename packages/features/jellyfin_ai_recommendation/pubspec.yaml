version: 0.1.0
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  equatable: ^2.0.5
  flutter_markdown: ^0.7.0
  dio: ^5.4.0
  jellyfin_core:
    path: ../../foundation/jellyfin_core
  jellyfin_models:
    path: ../../shared/jellyfin_models
  jellyfin_ui_kit:
    path: ../../shared/jellyfin_ui_kit

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  test: ^1.24.0
