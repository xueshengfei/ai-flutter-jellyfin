name: jellyfin_ai_recommendation
description: AI 对话推荐业务模块，SSE 流式通信、推荐卡片、NavigationIntent 跳转解耦。
version: 0.1.0
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  equatable: ^2.0.5
  flutter_markdown: ^0.7.0
  dio: ^5.4.0
  # 鸿蒙适配
  just_audio:
    path: ../../ohos/fluttertpc_just_audio/just_audio
  jellyfin_core:
    path: ../../foundation/jellyfin_core
  jellyfin_models:
    path: ../../shared/jellyfin_models
  jellyfin_ui_kit:
    path: ../../shared/jellyfin_ui_kit
  # 鸿蒙适配
  shared_preferences:
    path: ../../ohos/shared_preferences/shared_preferences
  path_provider:
    path: ../../ohos/path_provider/path_provider
  rainfall_tts_cloud_sdk:
    path: ../../vendor/rainfall_tts_cloud_sdk

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  test: ^1.24.0

flutter:
  assets:
    - assets/prompt_audio/
