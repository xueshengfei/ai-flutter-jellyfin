name: jellyfin_service
description: Jellyfin业务SDK - 提供完整的Jellyfin媒体库浏览、播放功能
version: 0.3.0
publish_to: 'none'

environment:
  sdk: '>=3.8.0 <4.0.0'
  flutter: ">=3.32.0"

dependencies:
  flutter:
    sdk: flutter

  # Jellyfin API SDK (接口层) - 本地路径依赖
  jellyfin_dart:
    path: packages/vendor/jellyfin_dart_3.8

  # 核心基础包
  jellyfin_core:
    path: packages/foundation/jellyfin_core

  # API 客户端包
  jellyfin_api:
    path: packages/foundation/jellyfin_api

  # 共享模型包
  jellyfin_models:
    path: packages/shared/jellyfin_models

  # 共享 UI 组件包
  jellyfin_ui_kit:
    path: packages/shared/jellyfin_ui_kit

  # AI 推荐业务模块
  jellyfin_ai_recommendation:
    path: packages/features/jellyfin_ai_recommendation

  # 通用媒体业务模块
  jellyfin_media:
    path: packages/features/jellyfin_media

  # 电影业务模块
  jellyfin_movies:
    path: packages/features/jellyfin_movies

  # 剧集业务模块
  jellyfin_series:
    path: packages/features/jellyfin_series

  # HTTP客户端
  dio: ^5.9.0

  # 日志
  logger: ^2.0.2

  # JSON序列化
  json_annotation: ^4.9.0
  equatable: ^2.0.7

  # 视频播放
  video_player: ^2.8.1
  chewie: ^1.7.5

  # 音频播放
  just_audio: ^0.9.42

  # 本地存储（视图模式偏好等）
  shared_preferences: ^2.2.2

  # 路径获取
  path_provider: ^2.1.5

  # 动画
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0

  # 图片缓存 + 取色
  cached_network_image: ^3.4.0
  palette_generator: ^0.3.3+4
  flutter_markdown: ^0.7.7+1

  # RVC 语音转换，AI翻唱
  rvc_flutter:
    path: packages/features/rvc_flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.8
  json_serializable: ^6.9.3

flutter:
  uses-material-design: true
