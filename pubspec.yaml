name: jellyfin_service
description: Jellyfin业务SDK - 提供完整的Jellyfin媒体库浏览、播放功能
version: 0.3.0
publish_to: 'none'

environment:
  sdk: '>=3.8.0 <4.0.0'
  flutter: ">=3.32.0"

dependencies:
  flutter:
    sdk: flutter

  # Jellyfin API SDK (接口层) - 本地路径依赖
  jellyfin_dart:
    path: packages/jellyfin_dart_3.8

  # HTTP客户端
  dio: ^5.9.0

  # 日志
  logger: ^2.0.2

  # JSON序列化
  json_annotation: ^4.9.0
  equatable: ^2.0.7

  # 视频播放
  video_player: ^2.8.1
  chewie: ^1.7.5

  # 音频播放
  just_audio: ^0.9.42

  # 本地存储（视图模式偏好等）
  shared_preferences: ^2.2.2

  # 路径获取
  path_provider: ^2.1.5

  # 动画
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0

  # 图片缓存 + 取色
  cached_network_image: ^3.4.0
  palette_generator: ^0.3.3+4
  flutter_markdown: ^0.7.7+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.8
  json_serializable: ^6.9.3

flutter:
  uses-material-design: true
