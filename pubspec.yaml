name: jellyfin_service
description: Jellyfin业务SDK - 提供完整的Jellyfin媒体库浏览、播放功能
version: 0.3.0
publish_to: 'none'

environment:
  sdk: '>=3.8.0 <4.0.0'
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # Jellyfin API SDK (接口层) - 本地路径依赖
  jellyfin_dart:
    path: packages/jellyfin_dart_3.8

  # 纯 Dart 依赖 - 无需鸿蒙适配
  dio: ^5.9.0
  logger: ^2.0.2
  json_annotation: ^4.9.0
  equatable: ^2.0.7

  # 视频播放 - 鸿蒙适配
  video_player:
    path: packages/ohos/video_player/video_player
  chewie:
    path: packages/ohos/fluttertpc_chewie

  # 音频播放 - 鸿蒙适配
  just_audio:
    path: packages/ohos/fluttertpc_just_audio/just_audio

  # 文件路径 - 鸿蒙适配
  path_provider:
    path: packages/ohos/path_provider/path_provider

  # 本地存储 - 鸿蒙适配
  shared_preferences:
    path: packages/ohos/shared_preferences/shared_preferences

  # EPUB 电子书解析
  epubx: ^4.0.0

  # 动画
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0

  # 图片缓存 + 取色
  cached_network_image: ^3.4.0
  palette_generator: ^0.3.3+4
  flutter_markdown: ^0.7.7+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.8
  json_serializable: ^6.9.3

# 鸿蒙适配：强制子依赖也使用本地 ohos 路径
dependency_overrides:
  path_provider:
    path: packages/ohos/path_provider/path_provider

flutter:
  uses-material-design: true
