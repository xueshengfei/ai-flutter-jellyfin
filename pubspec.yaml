name: jellyfin_service
description: Jellyfin业务SDK - 提供完整的Jellyfin媒体库浏览、播放功能
version: 0.2.0
publish_to: 'none'

environment:
  sdk: '>=3.8.0 <4.0.0'
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # Jellyfin API SDK (接口层) - 本地路径依赖
  jellyfin_dart:
    path: ..\jellyfin_dart-0.1.0

  # HTTP客户端
  dio: ^5.9.0

  # 日志
  logger: ^2.0.2

  # JSON序列化
  json_annotation: ^4.9.0
  equatable: ^2.0.7

  # 视频播放
  video_player: ^2.8.1
  chewie: ^1.7.5

  # 音频播放
  audioplayers: ^6.1.0

  # 本地存储（视图模式偏好等）
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.8
  json_serializable: ^6.9.3

flutter:
  uses-material-design: true
