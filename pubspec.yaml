name: jellyfin_service
description: Jellyfin业务SDK - 简化版，只包含认证功能
version: 0.1.0
publish_to: 'none'

environment:
  sdk: '>=3.9.0 <4.0.0'
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # Jellyfin API SDK (接口层)
  jellyfin_dart: 0.1.0

  # HTTP客户端
  dio: ^5.9.0

  # 日志
  logger: ^2.0.2

  # JSON序列化
  json_annotation: ^4.9.0
  equatable: ^2.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.8
  json_serializable: ^6.9.3

flutter:
  uses-material-design: true
